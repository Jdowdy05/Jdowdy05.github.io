<!doctype html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <button class="mobile-menu" id="mobile-menu" type="button" aria-controls="site-sidebar" aria-expanded="false">
      <span class="mobile-menu__mark" aria-hidden="true"><span></span><span></span><span></span></span>
      <span>Menu</span>
    </button>

    {% include sidebar.html %}
    <button class="drawer-backdrop" id="drawer-backdrop" type="button" aria-label="Close navigation menu" aria-hidden="true" tabindex="-1"></button>
    <canvas class="life-background" id="life-background" aria-hidden="true"></canvas>

    <main class="main" id="main-content" tabindex="-1">
      <div class="content">
        {{ content }}
      </div>
      <footer class="site-footer">
        <span>© {{ 'now' | date: '%Y' }} {{ site.data.profile.name }}</span>
        <span>Robotics · Reinforcement learning · Embodied systems</span>
      </footer>
    </main>

    <script src="{{ '/assets/js/life-background.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sidebar.js' | relative_url }}" defer></script>
  </body>
</html>
